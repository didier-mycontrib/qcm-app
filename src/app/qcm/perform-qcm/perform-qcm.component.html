<p class="underline">question {{numQuestion}} / {{nbQuestions}}</p>
<p class="font-bold">{{currentQuestion?.question}}</p>
 @for(a of currentQuestion?.answers; track a){
   <div>
    <input type="checkbox" [(ngModel)]="selections[a.txtNum]"/>
    {{a.txtNum}}.  {{a.text}}
   </div>
 }
   <input type="button" [value]="numQuestion<nbQuestions?'suivant':'terminer'" (click)="onNext()" />
